
mode: "train"  # "train", "test"



train:
    num_epochs: 50
    batch_size: 6  # 36
    learning_rate: 0.001
    weight_decay: 0.0001
    criterion: "focal_loss"  # "cross_entropy", "focal_loss"
    optimizer: "Adamw"  # "Adamw", "SGD"
    scheduler: "cosine"  # "cosine", "step"
    output_dir: "./output"
    exp_name: "experiment_run"
    used_train_samples: -1  # -1, 5
    used_val_samples: -1   # -1, 5
    continue_training: False
    last_training_output_dir: "./output/2026-07-08_09-04-31_experiment_run"
    # 2026-07-07_17-31-57_experiment_run
    # 2026-07-08_09-04-31_experiment_run



test:
    batch_size: 6
    output_dir: "./output"


model:
    name: "standard_nca"
    check_point_path: None
    # "./output/2026-07-05_23-45-49_overfit/latest_model.pth" 
    # None 
    # "./output/2026-07-05_17-18-54_overfit/latest_model.pth"
    # "./output/2026-07-05_23-45-49_overfit/latest_model.pth"
    
    kwargs: 
        hidden_channels: 16                             # 8, 16, 32, 64, 128
        steps: 64                                       # 8, 16, 32, 64, 128
